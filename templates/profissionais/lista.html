{% extends "base.html" %}
{% block content %}
<h2>Profissionais</h2>
<p><a class="button" href="{% url 'profissionais_novo' %}">Novo profissional</a></p>
<table>
<tr><th>ID</th><th>Nome</th><th>Ativo</th><th>Ações</th></tr>
{% for item in profissionais %}
<tr><td>{{ item.id }}</td><td>{{ item.nome }}</td><td>{{ item.ativo|yesno:"Sim,Não" }}</td><td class="actions"><a href="{% url 'profissionais_editar' item.pk %}">Editar</a> <a href="{% url 'profissionais_excluir' item.pk %}">Excluir</a></td></tr>
{% empty %}<tr><td colspan="4">Nenhum profissional cadastrado.</td></tr>{% endfor %}
</table>
{% endblock %}
