{% extends "base.html" %}
{% block content %}
<h2>Clientes</h2>
<p><a class="button" href="{% url 'clientes_novo' %}">Novo cliente</a></p>
<table>
<tr><th>ID</th><th>Nome</th><th>Telefone</th><th>Email</th><th>Ações</th></tr>
{% for item in clientes %}
<tr><td>{{ item.id }}</td><td>{{ item.nome }}</td><td>{{ item.telefone }}</td><td>{{ item.email }}</td><td class="actions"><a href="{% url 'clientes_editar' item.pk %}">Editar</a> <a href="{% url 'clientes_excluir' item.pk %}">Excluir</a></td></tr>
{% empty %}<tr><td colspan="5">Nenhum cliente cadastrado.</td></tr>{% endfor %}
</table>
{% endblock %}
