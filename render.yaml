services:
  - type: web
    name: pi-barbearia
    env: python
    plan: free
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: BARBEARIA_NOME
        sync: false

  - type: cron
    name: lembrete-agendamentos
    env: python
    # 08:00 BRT = 11:00 UTC (UTC-3)
    schedule: "0 11 * * *"
    buildCommand: pip install -r requirements/prod.txt
    startCommand: python manage.py enviar_lembretes
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: BARBEARIA_NOME
        sync: false
